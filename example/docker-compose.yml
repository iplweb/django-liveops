services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: example/Dockerfile
    command: web
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      RUNNER: celery
      SECRET_KEY: demo-docker-key-change-in-production
      DEBUG: "true"
      # Shared SQLite file so web + worker see the same database.
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - static_root:/app/staticroot
      - db_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/__login__/"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ..
      dockerfile: example/Dockerfile
    command: worker
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      RUNNER: celery
      SECRET_KEY: demo-docker-key-change-in-production
      # Same shared SQLite file as web (see settings.SQLITE_PATH).
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - db_data:/data
    depends_on:
      redis:
        condition: service_healthy
      # Start only after web has migrated + seeded the shared DB, so the
      # worker never races web on first-boot migrations.
      web:
        condition: service_healthy

volumes:
  static_root:
  db_data:
