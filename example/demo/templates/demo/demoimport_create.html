{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "New import — demo" %}{% endblock %}
{% block content %}
<h1>{% trans "New demonstration import" %}</h1>
<p>{% trans "Click “Start” to run a 5-stage import with a live progress preview." %}</p>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn">{% trans "Start" %}</button>
</form>
{% endblock %}
