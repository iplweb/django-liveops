name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --extra redis --extra celery --extra cli
      - name: ruff check
        run: uv run ruff check .
      - name: mkdocs build (strict)
        run: uv run mkdocs build --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Django 5.2 LTS on all supported Pythons, plus Django 6.0 on the
        # Pythons it supports (6.0 requires 3.12+).
        python-version: ["3.11", "3.12", "3.13"]
        django: ["5.2.*"]
        include:
          - python-version: "3.12"
            django: "6.0.*"
          - python-version: "3.13"
            django: "6.0.*"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (pin Django ${{ matrix.django }})
        run: uv sync --extra dev --extra redis --extra celery --extra cli
      - name: Run tests
        # testcontainers spins a real Redis via the Docker daemon that is
        # preinstalled on ubuntu-latest runners (round-trip tier). If Docker
        # is unavailable the round-trip tests skip themselves.
        run: uv run --with "django==${{ matrix.django }}" pytest -q
