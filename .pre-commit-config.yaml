# Never rewrite vendored third-party assets (keep htmx byte-exact to upstream).
exclude: '^liveops/static/liveops/vendor/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--no-fix]
      - id: ruff-format
        args: [--check]
